dasch:
  rate_limit_rps: 0.5
  max_retries: 3
  backoff_base: 2.0
  request_timeout_sec: 120

paths:
  vasco_catalog: "data/vasco_catalog"
  dasch_metadata: "data/dasch_metadata"
  lightcurves: "data/lightcurves"
  fits_cutouts: "data/fits_cutouts"
  results: "data/results"
  db: "data/pipeline.db"

pipeline:
  date_start: "1949-11-01"
  date_end: "1957-10-04"
  checkpoint_interval: 100
  search_radius_arcsec: 10.0
  start_with_vetted: true
  refcat: "apass"
